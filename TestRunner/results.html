<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VCS Test Results</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f7f5;
    --bg-tertiary: #efefea;
    --text-primary: #1f1f1d;
    --text-secondary: #6b6b65;
    --text-tertiary: #9c9c95;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.16);
    --accent: #2563eb;
    --pass-bg: #eaf3de; --pass-fg: #3b6d11; --pass-dot: #639922;
    --fail-bg: #fcebeb; --fail-fg: #a32d2d; --fail-dot: #e24b4a;
    --skip-bg: #f1efe8; --skip-fg: #5f5e5a; --skip-dot: #888780;
    --error-bg: #faeeda; --error-fg: #854f0b; --error-dot: #ba7517;
    --pending-bg: #eef0f4; --pending-fg: #6b7280; --pending-dot: #9ca3af;
    --stale-bg: #f5f0e8; --stale-fg: #8a6d3b;
    --radius-md: 6px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "SF Mono", Menlo, Consolas, "Courier New", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1f1f1d; --bg-secondary: #262624; --bg-tertiary: #2c2c2a;
      --text-primary: #e8e8e3; --text-secondary: #b0b0a8; --text-tertiary: #80807a;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.18);
      --pass-bg: #1f3010; --pass-fg: #97c459;
      --fail-bg: #3a1313; --fail-fg: #f09595;
      --skip-bg: #2c2c2a; --skip-fg: #b4b2a9;
      --error-bg: #3a2510; --error-fg: #ef9f27;
      --pending-bg: #2a2a30; --pending-fg: #9ca3af;
      --stale-bg: #332a1a; --stale-fg: #c9a86c;
    }
  }
  html, body {
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-primary);
    background: var(--bg-secondary);
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }
  .header { margin-bottom: 24px; }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .header .meta { font-size: 12px; color: var(--text-secondary); }
  .header .provenance { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }
  .grid-overview {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 800px) { .grid-overview { grid-template-columns: 1fr; } }
  .card {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .donut-svg { width: 140px; height: 140px; }
  .donut-center {
    font-size: 22px;
    font-weight: 600;
    fill: var(--text-primary);
  }
  .donut-label { font-size: 11px; fill: var(--text-secondary); }
  .stats-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 16px;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-variant-numeric: tabular-nums;
  }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-dot.pass { background: var(--pass-dot); }
  .stat-dot.fail { background: var(--fail-dot); }
  .stat-dot.error { background: var(--error-dot); }
  .stat-dot.skip { background: var(--skip-dot); }
  .stat-dot.pending { background: var(--pending-dot); }
  .stat-dot.stale { background: var(--stale-fg); }
  .stat-num { font-weight: 600; }
  .stat-label { color: var(--text-secondary); font-size: 12px; }
  .section { margin-bottom: 24px; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 12px;
  }
  .section-head h2 { font-size: 14px; font-weight: 600; }
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .bar-label {
    width: 180px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
  }
  .bar-track {
    flex: 1;
    height: 18px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
    min-width: 60px;
  }
  .bar-seg { height: 100%; }
  .bar-seg.pass { background: var(--pass-dot); }
  .bar-seg.fail { background: var(--fail-dot); }
  .bar-seg.error { background: var(--error-dot); }
  .bar-seg.skip { background: var(--skip-dot); }
  .bar-seg.pending { background: var(--pending-dot); opacity: 0.5; }
  .bar-count { width: 36px; text-align: right; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  .list { list-style: none; }
  .list li {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .list li:last-child { border-bottom: none; }
  .list .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); }
  .list .detail { color: var(--text-secondary); margin-top: 2px; font-size: 11px; }
  .list .time { color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .search-input {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    font-family: inherit;
    font-size: 12px;
    color: var(--text-primary);
    min-width: 200px;
  }
  .filter-tabs {
    display: flex;
    gap: 2px;
    background: var(--bg-tertiary);
    border-radius: var(--radius-md);
    padding: 2px;
  }
  .filter-tab {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-secondary);
    border: none;
    background: none;
    font-family: inherit;
  }
  .filter-tab.active {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .suite-group { margin-bottom: 4px; }
  .suite-header {
    padding: 8px 12px;
    background: var(--bg-tertiary);
    font-weight: 500;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: var(--radius-md) var(--radius-md) 0 0;
  }
  .suite-header .chevron { font-size: 10px; transition: transform 0.15s; }
  .suite-group.collapsed .suite-rows { display: none; }
  .suite-group.collapsed .chevron { transform: rotate(-90deg); }
  .test-row {
    padding: 6px 12px 6px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    cursor: pointer;
  }
  .test-row:hover { background: var(--bg-secondary); }
  .test-row.selected { background: var(--bg-tertiary); }
  .test-row.fail { background: rgba(226,75,74,0.06); }
  .test-row.pending { opacity: 0.65; }
  .status-icon { width: 14px; text-align: center; font-weight: 700; font-size: 11px; flex-shrink: 0; }
  .status-icon.pass { color: var(--pass-fg); }
  .status-icon.fail { color: var(--fail-fg); }
  .status-icon.error { color: var(--error-fg); }
  .status-icon.skip { color: var(--skip-fg); }
  .status-icon.pending { color: var(--pending-fg); }
  .test-name { flex: 1; font-family: var(--font-mono); font-size: 11px; }
  .badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 500;
  }
  .badge.stale { background: var(--stale-bg); color: var(--stale-fg); }
  .badge.tag { background: var(--bg-tertiary); color: var(--text-secondary); font-family: var(--font-mono); }
  .detail-panel {
    margin-top: 16px;
    padding: 14px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    display: none;
  }
  .detail-panel.visible { display: block; }
  .detail-title { font-weight: 500; margin-bottom: 4px; }
  .detail-loc { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-bottom: 10px; }
  .assertion {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .assertion.fail { border-color: rgba(226,75,74,0.3); background: var(--fail-bg); }
  .error-block {
    background: var(--fail-bg);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fail-fg);
    white-space: pre-wrap;
    margin-bottom: 10px;
  }
  .empty { padding: 24px; text-align: center; color: var(--text-tertiary); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<script id="vcs-test-state" type="application/json">__VCS_TEST_STATE_JSON__</script>

<div class="page" id="app">
  <div class="empty">Loading test results...</div>
</div>

<script>
'use strict';

function parseState() {
  // Do not mention the template placeholder token here — VBA Replace injects
  // the JSON into every occurrence, which would break this string literal.
  const el = document.getElementById('vcs-test-state');
  if (!el) return null;
  const raw = (el.textContent || '').trim();
  if (!raw || raw.charAt(0) !== '{') return null;
  try { return JSON.parse(raw); }
  catch (e) { return null; }
}

function basename(p) {
  if (!p) return '';
  const parts = String(p).replace(/\\/g, '/').split('/');
  return parts[parts.length - 1] || p;
}

function normStatus(s) {
  return String(s || 'PENDING').toUpperCase();
}

function webStatus(status, stale) {
  const s = normStatus(status);
  if (s === 'PENDING') return 'pending';
  if (stale) return 'stale';
  if (s === 'PASSED') return 'pass';
  if (s === 'FAILED') return 'fail';
  if (s === 'ERRORED') return 'error';
  if (s === 'EMPTY') return 'skip';
  return 'pending';
}

function statusIcon(st) {
  if (st === 'pass') return '✓';
  if (st === 'fail') return '✗';
  if (st === 'error') return '!';
  if (st === 'skip') return '–';
  return '○';
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function buildIndex(state) {
  const tests = state.tests || {};
  const rows = [];
  const suites = {};
  const counts = {
    fresh: 0, stale: 0, pending: 0,
    pass: 0, fail: 0, error: 0, skip: 0,
    executed: 0, assertions: 0
  };

  for (const key of Object.keys(tests)) {
    const t = tests[key];
    const status = normStatus(t.status);
    const stale = !!t.stale;
    const ws = webStatus(status, stale);
    const row = {
      key, test: t,
      module: t.moduleName || '',
      proc: t.procName || '',
      status, ws, stale,
      durationMs: t.durationMs || 0,
      tags: t.tags || []
    };
    rows.push(row);

    if (!suites[row.module]) suites[row.module] = { name: row.module, rows: [], counts: { pass: 0, fail: 0, error: 0, skip: 0, pending: 0 } };
    suites[row.module].rows.push(row);
    suites[row.module].counts[ws === 'stale' ? (status === 'PASSED' ? 'pass' : status === 'FAILED' ? 'fail' : status === 'ERRORED' ? 'error' : 'skip') : ws] =
      (suites[row.module].counts[ws === 'stale' ? (status === 'PASSED' ? 'pass' : status === 'FAILED' ? 'fail' : status === 'ERRORED' ? 'error' : 'skip') : ws] || 0) + 1;

    if (status === 'PENDING') {
      counts.pending++;
    } else {
      counts.executed++;
      if (stale) counts.stale++;
      else counts.fresh++;
      if (ws === 'pass' || (stale && status === 'PASSED')) counts.pass++;
      else if (ws === 'fail' || (stale && status === 'FAILED')) counts.fail++;
      else if (ws === 'error' || (stale && status === 'ERRORED')) counts.error++;
      else if (ws === 'skip' || (stale && status === 'EMPTY')) counts.skip++;
    }
    if (t.assertions) counts.assertions += t.assertions.length;
  }

  rows.sort((a, b) => a.module.localeCompare(b.module) || a.proc.localeCompare(b.proc));
  return { rows, suites, counts };
}

function renderDonut(counts) {
  const executed = counts.executed || 1;
  const pass = counts.pass || 0;
  const fail = counts.fail || 0;
  const error = counts.error || 0;
  const skip = counts.skip || 0;
  const rate = executed > 0 ? Math.round((pass / executed) * 100) : 0;
  const total = pass + fail + error + skip || 1;
  const r = 54, c = 2 * Math.PI * r;
  let offset = 0;
  const segs = [
    { n: pass, color: 'var(--pass-dot)' },
    { n: fail, color: 'var(--fail-dot)' },
    { n: error, color: 'var(--error-dot)' },
    { n: skip, color: 'var(--skip-dot)' }
  ];
  let arcs = '';
  for (const seg of segs) {
    if (seg.n <= 0) continue;
    const len = (seg.n / total) * c;
    arcs += `<circle cx="70" cy="70" r="${r}" fill="none" stroke="${seg.color}" stroke-width="14"
      stroke-dasharray="${len} ${c - len}" stroke-dashoffset="${-offset}" transform="rotate(-90 70 70)"/>`;
    offset += len;
  }
  return `<div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 140 140">${arcs}
      <text x="70" y="66" text-anchor="middle" class="donut-center">${rate}%</text>
      <text x="70" y="84" text-anchor="middle" class="donut-label">pass rate</text>
    </svg>
  </div>`;
}

function renderSuiteBars(suites) {
  const names = Object.keys(suites).sort();
  if (!names.length) return '<div class="empty">No suites</div>';
  return names.map(name => {
    const s = suites[name];
    const c = s.counts;
    const total = s.rows.length || 1;
  const parts = [
      ['pass', c.pass], ['fail', c.fail], ['error', c.error], ['skip', c.skip], ['pending', c.pending]
    ].filter(([, n]) => n > 0).map(([k, n]) =>
      `<div class="bar-seg ${k}" style="width:${(n / total) * 100}%"></div>`
    ).join('');
    return `<div class="bar-row">
      <div class="bar-label" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
      <div class="bar-track">${parts}</div>
      <div class="bar-count">${s.rows.length}</div>
    </div>`;
  }).join('');
}

function renderSlowest(rows, n) {
  const slow = rows.filter(r => r.status !== 'PENDING' && r.durationMs > 0)
    .sort((a, b) => b.durationMs - a.durationMs).slice(0, n);
  if (!slow.length) return '<li class="empty">No timing data</li>';
  return slow.map(r => `<li>
    <div class="name">${escapeHtml(r.module)}.${escapeHtml(r.proc)}</div>
    <div class="time">${r.durationMs}ms</div>
  </li>`).join('');
}

function renderFailures(rows) {
  const fails = rows.filter(r => r.status === 'FAILED' || r.status === 'ERRORED');
  if (!fails.length) return '<li class="empty">No failures</li>';
  return fails.map(r => {
    let detail = r.test.errorMessage || '';
    if (!detail && r.test.assertions) {
      detail = r.test.assertions.filter(a => !a.passed).map(a => a.context || ('Assertion ' + a.seq)).join('; ');
    }
    return `<li>
      <div class="name">${escapeHtml(r.module)}.${escapeHtml(r.proc)}${r.stale ? ' <span class="badge stale">stale</span>' : ''}</div>
      <div class="detail">${escapeHtml(detail || r.status)}</div>
    </li>`;
  }).join('');
}

function renderAssertions(test) {
  const assertions = test.assertions || [];
  if (!assertions.length) return '';
  return assertions.map(a => `<div class="assertion ${a.passed ? '' : 'fail'}">
    <strong>${a.passed ? '✓' : '✗'}</strong> #${a.seq}
    ${a.context ? ' — ' + escapeHtml(a.context) : ''}
  </div>`).join('');
}

function renderDetail(row) {
  if (!row) return '';
  const t = row.test;
  let html = `<div class="detail-title">${escapeHtml(row.proc)}</div>
    <div class="detail-loc">${escapeHtml(row.module)} · line ${t.line || '?'}</div>`;
  if (t.errorMessage) html += `<div class="error-block">${escapeHtml(t.errorMessage)}</div>`;
  html += renderAssertions(t);
  return html;
}

function matchesFilter(row, filter) {
  if (filter === 'all') return true;
  if (filter === 'failed') return row.status === 'FAILED' || row.status === 'ERRORED';
  if (filter === 'skipped') return row.status === 'EMPTY';
  if (filter === 'pending') return row.status === 'PENDING';
  return true;
}

function renderApp(state) {
  const idx = buildIndex(state);
  const project = basename(state.databasePath) || 'Test results';
  const runAt = state.sessionRunAt || state.runAt || '';
  const version = state.addinVersion || '';
  const prov = `${idx.counts.fresh} run this session · ${idx.counts.stale} carried over · ${idx.counts.pending} not run`;

  const app = document.getElementById('app');
  app.innerHTML = `
    <header class="header">
      <h1>${escapeHtml(project)}</h1>
      <div class="meta">VCS ${escapeHtml(version)}${runAt ? ' · ' + escapeHtml(runAt) : ''}</div>
      <div class="provenance">${escapeHtml(prov)}</div>
    </header>

    <div class="grid-overview">
      <div class="card">${renderDonut(idx.counts)}</div>
      <div class="card">
        <div class="card-title">Summary</div>
        <div class="stats-row">
          <div class="stat-pill"><span class="stat-dot pass"></span><span class="stat-num">${idx.counts.pass}</span><span class="stat-label">passed</span></div>
          <div class="stat-pill"><span class="stat-dot fail"></span><span class="stat-num">${idx.counts.fail}</span><span class="stat-label">failed</span></div>
          <div class="stat-pill"><span class="stat-dot error"></span><span class="stat-num">${idx.counts.error}</span><span class="stat-label">errored</span></div>
          <div class="stat-pill"><span class="stat-dot skip"></span><span class="stat-num">${idx.counts.skip}</span><span class="stat-label">skipped</span></div>
          <div class="stat-pill"><span class="stat-dot pending"></span><span class="stat-num">${idx.counts.pending}</span><span class="stat-label">not run</span></div>
        </div>
        <div class="stats-row">
          <div class="stat-pill"><span class="stat-num">${idx.rows.length}</span><span class="stat-label">tests</span></div>
          <div class="stat-pill"><span class="stat-num">${idx.counts.assertions}</span><span class="stat-label">assertions</span></div>
          <div class="stat-pill"><span class="stat-dot stale"></span><span class="stat-num">${idx.counts.stale}</span><span class="stat-label">stale</span></div>
        </div>
      </div>
    </div>

    <section class="section card">
      <div class="section-head"><h2>Per-suite breakdown</h2></div>
      <div class="bar-chart">${renderSuiteBars(idx.suites)}</div>
    </section>

    <div class="two-col">
      <section class="section card">
        <div class="section-head"><h2>Slowest tests</h2></div>
        <ul class="list">${renderSlowest(idx.rows, 8)}</ul>
      </section>
      <section class="section card">
        <div class="section-head"><h2>Failures</h2></div>
        <ul class="list">${renderFailures(idx.rows)}</ul>
      </section>
    </div>

    <section class="section card">
      <div class="section-head"><h2>All tests</h2></div>
      <div class="toolbar">
        <input type="text" class="search-input" id="search" placeholder="Filter tests...">
        <div class="filter-tabs" id="filters">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="failed">Failed</button>
          <button class="filter-tab" data-filter="skipped">Skipped</button>
          <button class="filter-tab" data-filter="pending">Not run</button>
        </div>
      </div>
      <div id="test-tree"></div>
      <div class="detail-panel" id="detail"></div>
    </section>
  `;

  let filter = 'all';
  let search = '';
  let selectedKey = null;

  function renderTree() {
    const tree = document.getElementById('test-tree');
    const names = Object.keys(idx.suites).sort();
    let html = '';
    for (const name of names) {
      const suiteRows = idx.suites[name].rows.filter(r => {
        if (!matchesFilter(r, filter)) return false;
        if (search) {
          const q = search.toLowerCase();
          return (r.module + '.' + r.proc).toLowerCase().includes(q) ||
            (r.tags || []).some(t => t.toLowerCase().includes(q));
        }
        return true;
      });
      if (!suiteRows.length) continue;
      html += `<div class="suite-group">
        <div class="suite-header"><span class="chevron">▼</span>${escapeHtml(name)} <span style="color:var(--text-tertiary);font-weight:400">(${suiteRows.length})</span></div>
        <div class="suite-rows">${suiteRows.map(r => {
          const staleBadge = r.stale && r.status !== 'PENDING' ? '<span class="badge stale">stale</span>' : '';
          const tags = (r.tags || []).slice(0, 3).map(t => `<span class="badge tag">${escapeHtml(t)}</span>`).join(' ');
          return `<div class="test-row ${r.ws} ${r.status === 'PENDING' ? 'pending' : ''} ${selectedKey === r.key ? 'selected' : ''}" data-key="${escapeHtml(r.key)}">
            <span class="status-icon ${r.ws}">${statusIcon(r.ws)}</span>
            <span class="test-name">${escapeHtml(r.proc)}</span>
            ${staleBadge} ${tags}
            <span class="time">${r.durationMs ? r.durationMs + 'ms' : ''}</span>
          </div>`;
        }).join('')}</div>
      </div>`;
    }
    tree.innerHTML = html || '<div class="empty">No tests match filter</div>';

    tree.querySelectorAll('.suite-header').forEach(h => {
      h.addEventListener('click', () => h.parentElement.classList.toggle('collapsed'));
    });
    tree.querySelectorAll('.test-row').forEach(row => {
      row.addEventListener('click', () => {
        selectedKey = row.dataset.key;
        const r = idx.rows.find(x => x.key === selectedKey);
        const detail = document.getElementById('detail');
        detail.innerHTML = renderDetail(r);
        detail.classList.add('visible');
        renderTree();
      });
    });
  }

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-tab');
    if (!btn) return;
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t === btn));
    renderTree();
  });
  document.getElementById('search').addEventListener('input', e => {
    search = e.target.value;
    renderTree();
  });

  renderTree();
}

const state = parseState();
if (!state || !state.tests) {
  document.getElementById('app').innerHTML = '<div class="empty">No test results data found.</div>';
} else {
  renderApp(state);
}
</script>
</body>
</html>
